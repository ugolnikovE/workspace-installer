start-at-login = true
exec-on-workspace-change = ['/bin/bash', '-c', 'sketchybar --trigger aerospace_workspace_change']
after-startup-command = ['exec-and-forget open -n -a Ghostty && sleep 1 && open -n -a Ghostty']

[gaps]
inner.horizontal = 4
inner.vertical = 4
outer.left = 4
outer.right = 4
outer.top = 0
outer.bottom = 4

[mode.main.binding]
# Terminal
alt-t = 'exec-and-forget open -n -a Ghostty'

# Focus
alt-h = 'focus --boundaries-action wrap-around-the-workspace left'
alt-j = 'focus --boundaries-action wrap-around-the-workspace down'
alt-k = 'focus --boundaries-action wrap-around-the-workspace up'
alt-l = 'focus --boundaries-action wrap-around-the-workspace right'

# Tile movement
alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'

# Layouts
alt-f = 'fullscreen'
alt-e = 'layout tiles horizontal vertical'
alt-shift-space = 'layout floating tiling'

# Join (i3-style split аналог)
alt-b = 'join-with left'
alt-v = 'join-with down'

# Workspaces
alt-1 = 'workspace 1'
alt-2 = 'workspace 2'

alt-shift-1 = 'move-node-to-workspace 1'
alt-shift-2 = 'move-node-to-workspace 2'

# Resize
alt-r = 'mode resize'
alt-shift-c = 'reload-config'
alt-shift-q = 'exec-and-forget osascript -e "tell application (path to frontmost application as text) to quit"'
alt-shift-f = 'flatten-workspace-tree'
alt-shift-a = 'enable toggle'

[mode.resize.binding]
h = 'resize width -50'
j = 'resize height +50'
k = 'resize height -50'
l = 'resize width +50'
enter = 'mode main'
esc = 'mode main'